version: "3.9"

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: phishnet-db
    environment:
      POSTGRES_DB: phishnet
      POSTGRES_USER: phishnet
      POSTGRES_PASSWORD: phishnet_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishnet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishnet-network

  # ==========================================================================
  # Redis (Cache + Message Broker)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: phishnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phishnet-network

  # ==========================================================================
  # FastAPI Backend
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishnet-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://phishnet:phishnet_pass@postgres:5432/phishnet
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - model_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    networks:
      - phishnet-network

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishnet-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://phishnet:phishnet_pass@postgres:5432/phishnet
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - model_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      -Q default,scans,training
    networks:
      - phishnet-network

  # ==========================================================================
  # Celery Beat (Scheduler)
  # ==========================================================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishnet-beat
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    networks:
      - phishnet-network

  # ==========================================================================
  # React Frontend
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phishnet-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    networks:
      - phishnet-network

  # ==========================================================================
  # Flower (Celery Monitoring)
  # ==========================================================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phishnet-flower
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks flower
      --port=5555
      --broker_api=redis://redis:6379/1
    networks:
      - phishnet-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_data:
    driver: local

networks:
  phishnet-network:
    driver: bridge
    name: phishnet-network

